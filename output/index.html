<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freddy Va a Florida — Edición Diglot</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  :root{
    --bg:#f6f1e7; --bg-panel:#fffaf2; --ink:#2c2620; --ink-soft:#6b6256;
    --rule:#e3d8c4; --accent:#9a5b2c; --accent-soft:#c98a4f;
    --sp-bg:#fbeede; --sp-ink:#8a4a1c; --sp-line:#dcae7d;
    --shadow:0 1px 2px rgba(60,40,20,.06),0 8px 24px rgba(60,40,20,.08);
    --reading:18px; --measure:46rem;
  }
  html[data-theme="dark"]{
    --bg:#1c1a17; --bg-panel:#242019; --ink:#e9e1d2; --ink-soft:#a59b88;
    --rule:#3a342b; --accent:#e0a25e; --accent-soft:#c98a4f;
    --sp-bg:#332a1d; --sp-ink:#f0c386; --sp-line:#6b5634;
    --shadow:0 1px 2px rgba(0,0,0,.3),0 10px 30px rgba(0,0,0,.4);
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:var(--bg); color:var(--ink);
    font-family:Georgia,'Iowan Old Style','Palatino Linotype',Palatino,serif;
    -webkit-font-smoothing:antialiased; line-height:1.65;
    display:flex; flex-direction:column; height:100vh; overflow:hidden;
  }
  /* ---------- Top bar ---------- */
  header.topbar{
    display:flex; align-items:center; gap:.75rem;
    padding:.55rem .9rem; border-bottom:1px solid var(--rule);
    background:var(--bg-panel); flex:0 0 auto; z-index:30;
  }
  .brand{font-size:1.02rem; font-weight:700; letter-spacing:.2px; white-space:nowrap}
  .brand small{display:block; font-size:.66rem; font-weight:400; color:var(--ink-soft); letter-spacing:.4px; text-transform:uppercase}
  .topbar .spacer{flex:1}
  .ctrl{
    font:inherit; font-size:.85rem; cursor:pointer; color:var(--ink);
    background:transparent; border:1px solid var(--rule); border-radius:7px;
    padding:.32rem .55rem; line-height:1; display:inline-flex; align-items:center; gap:.3rem;
  }
  .ctrl:hover{border-color:var(--accent-soft)}
  .ctrl.icon{width:2rem; justify-content:center; font-size:1rem; padding:.32rem 0}
  #menuBtn{display:none}
  /* ---------- Layout ---------- */
  .shell{display:flex; flex:1; min-height:0}
  aside.toc{
    flex:0 0 19rem; max-width:80vw; overflow-y:auto;
    background:var(--bg-panel); border-right:1px solid var(--rule);
    padding:.4rem 0 2rem;
  }
  .toc h2{font-size:.7rem; text-transform:uppercase; letter-spacing:.12em; color:var(--ink-soft); margin:1rem 1.1rem .4rem; font-weight:700}
  .toc a{
    display:block; text-decoration:none; color:var(--ink);
    padding:.5rem 1.1rem; border-left:3px solid transparent; cursor:pointer;
  }
  .toc a:hover{background:rgba(154,91,44,.07)}
  .toc a.active{border-left-color:var(--accent); background:rgba(154,91,44,.1); font-weight:600}
  .toc a .t{display:block; font-size:.92rem}
  .toc a .m{display:block; font-size:.7rem; color:var(--ink-soft); margin-top:.1rem}
  .badge{display:inline-block; font-size:.64rem; padding:.05rem .4rem; border-radius:999px;
    background:var(--sp-bg); color:var(--sp-ink); border:1px solid var(--sp-line); vertical-align:middle}
  /* ---------- Reader ---------- */
  main.reader{flex:1; overflow-y:auto; scroll-behavior:smooth}
  .page{max-width:var(--measure); margin:0 auto; padding:2.6rem 1.4rem 5rem}
  article{font-size:var(--reading)}
  article h1{font-size:1.9em; line-height:1.15; text-align:center; margin:.2em 0 .1em; font-weight:700}
  article h2{font-size:1.15em; text-align:center; color:var(--ink-soft); font-weight:600; margin:1.6em 0 .6em;
    text-transform:uppercase; letter-spacing:.08em}
  article h2:first-of-type{margin-top:.4em}
  article h3{font-size:1.05em; margin:1.4em 0 .4em}
  article p{margin:0 0 1.05em; text-align:justify; hyphens:auto}
  article hr{border:none; text-align:center; margin:1.8em 0}
  article hr::before{content:"\2766"; color:var(--accent-soft); font-size:1.2em}
  article a{color:var(--accent); text-decoration:underline; text-underline-offset:2px}
  article blockquote{margin:1.4em 1em; padding:.2em 1.1em; border-left:3px solid var(--sp-line);
    color:var(--ink-soft); font-style:italic}
  article blockquote p{text-align:left}
  article em{font-style:italic}
  article strong{font-weight:700}
  /* tables (vocabulario) */
  article table{border-collapse:collapse; width:100%; margin:.8em 0 1.4em; font-size:.9em}
  article th,article td{border:1px solid var(--rule); padding:.4em .7em; text-align:left}
  article thead th{background:var(--sp-bg); color:var(--sp-ink)}
  article tbody tr:nth-child(even){background:rgba(154,91,44,.04)}
  article td:first-child{font-weight:600}
  /* diglot words */
  .diglot{
    color:var(--sp-ink); cursor:help; white-space:nowrap;
    border-bottom:1px dotted var(--sp-line); padding-bottom:.5px;
  }
  .diglot:hover,.diglot.pinned{background:var(--sp-bg); border-radius:3px}
  /* chapter nav */
  .chapnav{display:flex; justify-content:space-between; gap:1rem; margin-top:3rem;
    border-top:1px solid var(--rule); padding-top:1.4rem}
  .chapnav button{font:inherit; font-size:.9rem; background:var(--bg-panel); color:var(--ink);
    border:1px solid var(--rule); border-radius:9px; padding:.6rem .9rem; cursor:pointer; max-width:48%; text-align:left}
  .chapnav button:hover:not(:disabled){border-color:var(--accent-soft)}
  .chapnav button:disabled{opacity:.35; cursor:default}
  .chapnav button .lbl{display:block; font-size:.66rem; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-soft)}
  .chapnav button.next{text-align:right}
  /* tooltip */
  #tip{
    position:fixed; z-index:60; max-width:18rem; pointer-events:none; opacity:0;
    transform:translateY(4px); transition:opacity .12s,transform .12s;
    background:var(--ink); color:var(--bg); padding:.5rem .7rem; border-radius:9px;
    box-shadow:var(--shadow); font-family:system-ui,sans-serif; font-size:.82rem; line-height:1.4;
  }
  #tip.show{opacity:1; transform:translateY(0)}
  #tip .term{font-weight:700; display:block}
  #tip .trans{opacity:.85}
  #tip::after{content:""; position:absolute; left:var(--ax,50%); bottom:-5px; width:10px; height:10px;
    background:var(--ink); transform:translateX(-50%) rotate(45deg)}
  #tip.below::after{bottom:auto; top:-5px}
  /* loading / banner */
  .notice{max-width:var(--measure); margin:2rem auto; padding:1.2rem 1.4rem; border:1px solid var(--rule);
    border-radius:12px; background:var(--bg-panel); font-family:system-ui,sans-serif; font-size:.92rem; line-height:1.5}
  .notice code{background:var(--sp-bg); color:var(--sp-ink); padding:.1rem .4rem; border-radius:5px;
    font-family:ui-monospace,Menlo,monospace; font-size:.85em}
  .scrim{display:none; position:fixed; inset:0; background:rgba(20,16,10,.4); z-index:25}
  @media (max-width:820px){
    aside.toc{position:fixed; top:0; left:0; bottom:0; z-index:40; transform:translateX(-100%);
      transition:transform .22s ease; box-shadow:var(--shadow); padding-top:3.6rem}
    aside.toc.open{transform:translateX(0)}
    .scrim.open{display:block}
    #menuBtn{display:inline-flex}
    .brand small{display:none}
  }
</style>
</head>
<body>
  <header class="topbar">
    <button class="ctrl icon" id="menuBtn" title="Índice" aria-label="Índice">☰</button>
    <div class="brand">Freddy Va a Florida<small>Edición diglot · inglés → español</small></div>
    <div class="spacer"></div>
    <button class="ctrl icon" id="fontDown" title="Texto más pequeño">A−</button>
    <button class="ctrl icon" id="fontUp" title="Texto más grande">A+</button>
    <button class="ctrl icon" id="themeBtn" title="Modo claro/oscuro">◐</button>
  </header>

  <div class="shell">
    <aside class="toc" id="toc"></aside>
    <main class="reader" id="reader">
      <div class="page"><article id="content"></article>
        <nav class="chapnav" id="chapnav" hidden>
          <button class="prev" id="prevBtn"><span class="lbl">Anterior</span><span class="ttl"></span></button>
          <button class="next" id="nextBtn"><span class="lbl">Siguiente</span><span class="ttl"></span></button>
        </nav>
      </div>
    </main>
  </div>
  <div class="scrim" id="scrim"></div>
  <div id="tip"><span class="term"></span><span class="trans"></span></div>

<script>
/* ---------- Chapter manifest ---------- */
const CHAPTERS = [
  {f:"00-portada.md",  t:"Portada",        m:"Cómo usar este libro"},
  {f:"01-capitulo.md", t:"I",    band:1, pct:"15%", m:"La granja; los animales deciden migrar"},
  {f:"02-capitulo.md", t:"II",   band:1, pct:"18%", m:"La primera noche; la canción de la migración"},
  {f:"03-capitulo.md", t:"III",  band:1, pct:"20%", m:"El hombre del bigote negro"},
  {f:"04-capitulo.md", t:"IV",   band:2, pct:"22%", m:"Washington D.C.; el Presidente"},
  {f:"05-capitulo.md", t:"V",    band:2, pct:"25%", m:"La golondrina y el tesoro escondido"},
  {f:"06-capitulo.md", t:"VI",   band:2, pct:"28%", m:"La tormenta; la cabaña de troncos"},
  {f:"07-capitulo.md", t:"VII",  band:3, pct:"30%", m:"El señor Webb; los ladrones hormigas"},
  {f:"08-capitulo.md", t:"VIII", band:3, pct:"38%", m:"Las monedas de oro de la hormiga"},
  {f:"09-capitulo.md", t:"IX",   band:3, pct:"45%", m:"Robados; Freddy nada para escapar"},
  {f:"10-capitulo.md", t:"X",    band:3, pct:"48%", m:"Jinx y el cochecito colina abajo"},
  {f:"11-capitulo.md", t:"XI",   band:3, pct:"50%", m:"¡Florida! La playa; el océano"},
  {f:"12-capitulo.md", t:"XII",  band:4, pct:"58%", m:"Los Everglades; el Abuelo de los Caimanes"},
  {f:"13-capitulo.md", t:"XIII", band:4, pct:"60%", m:"El viaje de regreso; el chivo; el faetón"},
  {f:"14-capitulo.md", t:"XIV",  band:4, pct:"65%", m:"Disfrazados con pintura; el vagabundo"},
  {f:"15-capitulo.md", t:"XV",   band:5, pct:"70%", m:"Los ladrones; Jinx en la oscuridad"},
  {f:"16-capitulo.md", t:"XVI",  band:5, pct:"72%", m:"Las joyas robadas; la tía Etta"},
  {f:"17-capitulo.md", t:"XVII", band:5, pct:"74%", m:"La conferencia de Charles; el despertador"},
  {f:"18-capitulo.md", t:"XVIII",band:5, pct:"74%", m:"El regreso; roban el faetón"},
  {f:"19-capitulo.md", t:"XIX",  band:6, pct:"78%", m:"El señor Webb; Charles y Henrietta se escapan"},
  {f:"20-capitulo.md", t:"XX",   band:6, pct:"80%", m:"El consejo de guerra; recuperan el oro"},
  {f:"21-capitulo.md", t:"XXI",  band:6, pct:"82%", m:"El regreso a la granja; la canción de Freddy"},
];

/* ---------- Markdown → diglot HTML ---------- */
const norm = s => s.toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/[^a-z0-9]/g,'');
const escAttr = s => s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

function preprocess(md){
  // 1. Pull footnote definitions:  [^id]: term (translation)
  const defs = {};
  md = md.replace(/^\[\^([^\]]+)\]:[ \t]*(.+)$/gm, (_, id, body) => {
    const mm = body.match(/^(.*?)\s*\(([^)]*)\)\s*$/);
    defs[id] = mm ? {term:mm[1].trim(), trans:mm[2].trim()} : {term:body.trim(), trans:""};
    return ""; // strip definition line
  });

  // 2. Protect inline code spans so markers inside them are left alone
  const code = [];
  md = md.replace(/`[^`]*`/g, m => { code.push(m); return `␀C${code.length-1}␀`; });

  // 3. Wrap the Spanish word(s) preceding each [^id] marker
  const wordRe = /[\p{L}\p{M}’'-]+/gu;
  md = md.replace(/([^\n>]*?)\[\^([^\]]+)\]/g, (full, pre, id) => {
    const d = defs[id];
    if(!d) return pre;                       // unknown marker → drop it
    const words = [...pre.matchAll(wordRe)];
    if(!words.length) return pre;
    const termW = d.term.split(/\s+/).filter(Boolean);
    let j = words.length-1, k = termW.length-1, matched = 0;
    while(j>=0 && k>=0 && norm(words[j][0]) === norm(termW[k]) && norm(termW[k])!==''){ matched++; j--; k--; }
    if(matched===0) matched = 1;             // fall back to single preceding word
    const start = words[words.length-matched].index;
    const attr = `data-term="${escAttr(d.term)}" data-trans="${escAttr(d.trans)}"`;
    return pre.slice(0,start) + `<span class="diglot" ${attr}>` + pre.slice(start) + `</span>`;
  });

  // 4. Restore code spans
  md = md.replace(/␀C(\d+)␀/g, (_,i) => code[+i]);
  return md;
}

marked.setOptions({gfm:true, breaks:false});

/* ---------- Rendering & navigation ---------- */
const reader = document.getElementById('reader');
const content = document.getElementById('content');
const tocEl = document.getElementById('toc');
const chapnav = document.getElementById('chapnav');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
let current = -1;

/* ---------- Reading-progress persistence ----------
   Stored in localStorage as {last: chapterIndex, scroll: {index: scrollTop}} */
const PROGRESS_KEY = 'diglot-progress';
let progress = (()=>{ try{ return JSON.parse(localStorage.getItem(PROGRESS_KEY)) || {}; }catch(e){ return {}; } })();
if(!progress.scroll) progress.scroll = {};
let scrollSaveTimer;
function saveProgress(){ try{ localStorage.setItem(PROGRESS_KEY, JSON.stringify(progress)); }catch(e){} }
function flushScroll(){            // persist current chapter's scroll position
  if(current>=0){ progress.scroll[current] = Math.round(reader.scrollTop); progress.last = current; saveProgress(); }
}

function buildTOC(){
  let lastBand = null, html = '';
  CHAPTERS.forEach((c,i)=>{
    if(c.band && c.band!==lastBand){ html += `<h2>Banda ${c.band}</h2>`; lastBand = c.band; }
    else if(!c.band && lastBand!==0){ html += `<h2>Inicio</h2>`; lastBand = 0; }
    const title = c.band ? `Capítulo ${c.t}` : c.t;
    const meta = c.band ? `<span class="m"><span class="badge">${c.pct} español</span> ${c.m}</span>` : `<span class="m">${c.m}</span>`;
    html += `<a data-i="${i}"><span class="t">${title}</span>${meta}</a>`;
  });
  tocEl.innerHTML = html;
  tocEl.querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>{ load(+a.dataset.i); closeTOC(); }));
}

async function load(i){
  if(i<0 || i>=CHAPTERS.length) return;
  clearTimeout(scrollSaveTimer);
  flushScroll();                 // remember where we left the chapter we're leaving
  current = i;
  progress.last = i; saveProgress();
  location.hash = String(i);
  tocEl.querySelectorAll('a').forEach(a=>a.classList.toggle('active', +a.dataset.i===i));
  content.innerHTML = `<p style="text-align:center;color:var(--ink-soft)">Cargando…</p>`;
  chapnav.hidden = true;
  try{
    const res = await fetch(CHAPTERS[i].f, {cache:'no-cache'});
    if(!res.ok) throw new Error(res.status);
    const md = await res.text();
    content.innerHTML = marked.parse(preprocess(md));
    rewireLinks();
    updateChapNav();
    reader.scrollTo({top: progress.scroll[i] || 0, behavior:'auto'});  // resume where you left off
  }catch(e){
    showLoadError();
  }
}

function rewireLinks(){
  content.querySelectorAll('a[href$=".md"]').forEach(a=>{
    const file = a.getAttribute('href').split('/').pop();
    const idx = CHAPTERS.findIndex(c=>c.f===file);
    if(idx>=0){ a.addEventListener('click',ev=>{ ev.preventDefault(); load(idx); }); }
  });
}

function updateChapNav(){
  chapnav.hidden = false;
  const p = CHAPTERS[current-1], n = CHAPTERS[current+1];
  prevBtn.disabled = !p; nextBtn.disabled = !n;
  prevBtn.querySelector('.ttl').textContent = p ? (p.band?`Capítulo ${p.t}`:p.t) : '';
  nextBtn.querySelector('.ttl').textContent = n ? (n.band?`Capítulo ${n.t}`:n.t) : '';
}
prevBtn.addEventListener('click',()=>load(current-1));
nextBtn.addEventListener('click',()=>load(current+1));

function showLoadError(){
  chapnav.hidden = true;
  const fileMsg = location.protocol==='file:'
    ? `<p>You're opening this file directly (<code>file://</code>), so the browser blocks loading the chapter files. Start a tiny local server from the <code>output/</code> folder and open the printed URL:</p>
       <p><code>python3 -m http.server 8000</code></p>
       <p>then visit <code>http://localhost:8000/</code></p>`
    : `<p>No se pudo cargar el capítulo. Verifica que los archivos <code>.md</code> estén junto a <code>index.html</code>.</p>`;
  content.innerHTML = `<div class="notice"><strong>No se pudo cargar el contenido.</strong>${fileMsg}</div>`;
}

/* ---------- Tooltip ---------- */
const tip = document.getElementById('tip');
const tipTerm = tip.querySelector('.term'), tipTrans = tip.querySelector('.trans');
let pinned = null;

function showTip(el){
  tipTerm.textContent = el.dataset.term || '';
  tipTrans.textContent = el.dataset.trans || '';
  tip.classList.add('show');
  const r = el.getBoundingClientRect();
  tip.style.left='0'; tip.style.top='0';
  const tr = tip.getBoundingClientRect();
  let x = r.left + r.width/2 - tr.width/2;
  x = Math.max(8, Math.min(x, window.innerWidth - tr.width - 8));
  let below = false, y = r.top - tr.height - 9;
  if(y < 8){ y = r.bottom + 9; below = true; }
  tip.classList.toggle('below', below);
  tip.style.setProperty('--ax', (r.left + r.width/2 - x) + 'px');
  tip.style.left = x+'px'; tip.style.top = y+'px';
}
function hideTip(){ tip.classList.remove('show'); if(pinned){pinned.classList.remove('pinned'); pinned=null;} }

content.addEventListener('mouseover', e=>{ const d=e.target.closest('.diglot'); if(d && !pinned) showTip(d); });
content.addEventListener('mouseout', e=>{ const d=e.target.closest('.diglot'); if(d && !pinned) tip.classList.remove('show'); });
content.addEventListener('click', e=>{
  const d = e.target.closest('.diglot');
  if(!d){ hideTip(); return; }
  e.stopPropagation();
  if(pinned===d){ hideTip(); return; }
  if(pinned) pinned.classList.remove('pinned');
  pinned = d; d.classList.add('pinned'); showTip(d);
});
document.addEventListener('click', e=>{ if(!e.target.closest('.diglot')) hideTip(); });
reader.addEventListener('scroll', hideTip, {passive:true});
reader.addEventListener('scroll', ()=>{           // debounced save of reading position
  clearTimeout(scrollSaveTimer);
  scrollSaveTimer = setTimeout(flushScroll, 200);
}, {passive:true});
// Catch the last position when the tab is hidden or closed
window.addEventListener('pagehide', flushScroll);
document.addEventListener('visibilitychange', ()=>{ if(document.visibilityState==='hidden') flushScroll(); });

/* ---------- Controls: theme & font size ---------- */
const root = document.documentElement;
const savedTheme = localStorage.getItem('diglot-theme');
if(savedTheme) root.dataset.theme = savedTheme;
else if(window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches) root.dataset.theme='dark';
document.getElementById('themeBtn').addEventListener('click',()=>{
  root.dataset.theme = root.dataset.theme==='dark' ? 'light' : 'dark';
  localStorage.setItem('diglot-theme', root.dataset.theme);
});
let fs = parseFloat(localStorage.getItem('diglot-fs')) || 18;
function applyFS(){ root.style.setProperty('--reading', fs+'px'); localStorage.setItem('diglot-fs', fs); }
applyFS();
document.getElementById('fontUp').addEventListener('click',()=>{ fs=Math.min(26,fs+1); applyFS(); });
document.getElementById('fontDown').addEventListener('click',()=>{ fs=Math.max(14,fs-1); applyFS(); });

/* ---------- Mobile TOC drawer ---------- */
const scrim = document.getElementById('scrim');
function openTOC(){ tocEl.classList.add('open'); scrim.classList.add('open'); }
function closeTOC(){ tocEl.classList.remove('open'); scrim.classList.remove('open'); }
document.getElementById('menuBtn').addEventListener('click',openTOC);
scrim.addEventListener('click',closeTOC);

/* ---------- Keyboard ---------- */
document.addEventListener('keydown',e=>{
  if(e.target.matches('input,textarea')) return;
  if(e.key==='ArrowRight') load(current+1);
  else if(e.key==='ArrowLeft') load(current-1);
  else if(e.key==='Escape') hideTip();
});

/* ---------- Boot ---------- */
function hashIndex(){
  const n = parseInt(location.hash.replace('#',''),10);
  return Number.isInteger(n) && n>=0 && n<CHAPTERS.length ? n : 0;
}
// Support browser back/forward and manual hash edits
window.addEventListener('hashchange',()=>{ const i = hashIndex(); if(i!==current) load(i); });

buildTOC();
// Prefer an explicit #hash (deep link); otherwise resume the last-read chapter
let startIdx = 0;
const bootHash = parseInt(location.hash.replace('#',''),10);
if(Number.isInteger(bootHash) && bootHash>=0 && bootHash<CHAPTERS.length) startIdx = bootHash;
else if(Number.isInteger(progress.last) && progress.last>=0 && progress.last<CHAPTERS.length) startIdx = progress.last;
load(startIdx);
</script>
</body>
</html>
